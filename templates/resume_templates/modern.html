<div class="resume-block modern">
  <h1>{{data.name}}</h1>
  {% if photo %}<img src="{{photo}}" class="right-photo">{% endif %}
  <p>{{data.email}} • {{data.linkedin}} • {{data.github}}</p>

  <hr>
  <h2>Skills</h2><p>{{data.skills}}</p>
  <h2>Projects</h2><p>{{data.projects}}</p>
  <h2>Education</h2><p>{{data.education}}</p>
  <h2>Experience</h2><p>{{data.experience}}</p>
</div>
