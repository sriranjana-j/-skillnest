<div class="resume-block simple">
  <h1>{{data.name}}</h1>
  <p>{{data.email}}</p>
  <p>{{data.linkedin}} • {{data.github}}</p>
  {% if photo %}<img src="{{photo}}" class="resume-photo-small">{% endif %}

  <h3>Skills</h3><p>{{data.skills}}</p>
  <h3>Projects</h3><p>{{data.projects}}</p>
  <h3>Education</h3><p>{{data.education}}</p>
  <h3>Experience</h3><p>{{data.experience}}</p>
</div>
